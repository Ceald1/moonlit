{{ define "main" }}
  {{ .Content }}
  {{ range site.RegularPages }}
    <section>
      <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
      {{ if .Params.cover }}
        <a href="{{ .RelPermalink }}">
          <img src="{{ .Params.cover }}" alt="{{ .Title }}" class="preview-cover">
        </a>
      {{ else }}
        {{ .Summary }}
      {{ end }}
    </section>
  {{ end }}
{{ end }}
