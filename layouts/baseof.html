<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
<link rel="stylesheet" href="{{ "css/colors.css" | absLangURL }}">
<link rel="stylesheet" href="{{ "css/style.css" | absLangURL }}">
<link rel="stylesheet" href="{{ "css/mobile.css" | absLangURL }}">
</head>
<body>
<script src="https://unpkg.com/lucide@latest"></script>

  <header>
    {{ partial "header.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>

<script>
  lucide.createIcons();
</script>
</body>
</html>
